name: gateway-ci-sandbox

on:
  push:
    branches:
      - sandbox

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout protobuf repo
        uses: actions/checkout@v4
        with:
          repository: philandz/protobuf
          path: protobuf

      - name: Checkout libs repo
        uses: actions/checkout@v4
        with:
          repository: philandz/libs
          path: libs

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test
